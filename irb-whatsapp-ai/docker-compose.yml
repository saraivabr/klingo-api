version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: irb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-irb_whatsapp}
      POSTGRES_USER: ${POSTGRES_USER:-irb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irb_dev_2024}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-irb}']
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: irb-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: irb-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  bullboard:
    image: deadly0/bull-board
    container_name: irb-bullboard
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3100:3000'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:
