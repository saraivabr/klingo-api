resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy (resolve at runtime to avoid crash if api not available)
    set $api_upstream http://api:3001;

    location /api/teleconsultation/signal/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /ws {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Booking app - static assets (must come before general regex)
    location ^~ /agendar/assets/ {
        alias /usr/share/nginx/booking/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Booking app - SPA fallback
    location /agendar/ {
        alias /usr/share/nginx/booking/;
        try_files $uri $uri/ /agendar/index.html;
    }

    # Exam upload (reuses booking SPA bundle)
    location ^~ /enviar-pedido/assets/ {
        alias /usr/share/nginx/booking/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /enviar-pedido {
        alias /usr/share/nginx/booking/;
        try_files $uri $uri/ /agendar/index.html;
    }

    # Teleconsulta app - static assets
    location ^~ /consulta/assets/ {
        alias /usr/share/nginx/teleconsulta/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Teleconsulta app - SPA fallback
    location /consulta/ {
        alias /usr/share/nginx/teleconsulta/;
        try_files $uri $uri/ /consulta/index.html;
    }

    # Dashboard (painel do paciente) - movido para /painel/
    location ^~ /painel/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /painel/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /painel/index.html;
    }

    # Site público (homepage IRB Prime Care)
    location ^~ /_next/static/ {
        alias /usr/share/nginx/site/_next/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /usr/share/nginx/site;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
